name: Tailscale Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check Tailscale devices
        run: |
          curl -s \
          -u "${{ secrets.TAILSCALE_API }}:" \
          "https://api.tailscale.com/api/v2/tailnet/globesolution231.gmail.com/devices" \
          > devices.json

          OFFLINE=$(jq -r '.devices[] | select(.online == false) | .hostname' devices.json)

          if [ -n "$OFFLINE" ]; then
            MESSAGE="⚠️ Tailscale Alert%0A%0AOffline devices:%0A$OFFLINE"

            curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE"
          fi
